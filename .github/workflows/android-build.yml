name: BidReel Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build web
        env:
          VITE_API_URL: https://www.bid-reel.com/api
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          cd artifacts/bidreel-web
          pnpm run build

      - name: Sync Capacitor Android
        run: |
          cd artifacts/bidreel-web
          npx cap sync android

      - name: Auto bump Android version
        run: |
          VERSION_CODE=$((1000 + GITHUB_RUN_NUMBER))
          VERSION_NAME="1.0.${GITHUB_RUN_NUMBER}"

          sed -i "s/versionCode [0-9]\+/versionCode ${VERSION_CODE}/" artifacts/bidreel-web/android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION_NAME}\"/" artifacts/bidreel-web/android/app/build.gradle

          echo "Using versionCode=${VERSION_CODE}"
          echo "Using versionName=${VERSION_NAME}"

      - name: Restore keystore and key.properties
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > artifacts/bidreel-web/android/app/release.jks

          cat > artifacts/bidreel-web/android/key.properties <<EOF
          storeFile=app/release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build signed AAB
        run: |
          cd artifacts/bidreel-web/android
          ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: bidreel-aab
          path: artifacts/bidreel-web/android/app/build/outputs/bundle/release/*.aab

      - name: Upload to Google Play Internal Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON }}
          packageName: ${{ secrets.PACKAGE_NAME }}
          releaseFiles: artifacts/bidreel-web/android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: draft
          changesNotSentForReview: true
